<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <title>Number Converter</title>
    <style>
        body {
            font-family: 'Segoe UI',
            Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus {
            border-color: #3498db;
            outline: none;
        }
        p {
            font-weight: bold;
            color: #34495e;
        }
        .swap-btn {
            font-size: 0.8rem;
            color: #3498db;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class='card'>
    <h2 id='title'>Decimal to Roman</h2>
    <input type='text' id='inputVal' placeholder='Enter a number (e.g., 155)' oninput='convertir()'>
    <p id='result'>Result: -</p>
    <span class='swap-btn' onclick='toggleMode()'>Change Mode</span>
</div>
    
<script src='script.js'></script>
</body>
</html>
